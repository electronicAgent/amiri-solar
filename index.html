<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Amiri Solar Cleaning - Premium Booking</title>
    <style>
        :root {
            --bg-gradient: radial-gradient(circle at top, #131C38 0%, #080A11 100%);
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --eco-green: #39FF14;     /* Electric Lime Green */
            --pure-white: #FFFFFF;
            --text-muted: #7E8B9B;
            --text-accent: #4D76FD;    /* Clean Premium Royal Blue */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background: var(--bg-gradient);
            color: var(--pure-white);
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 410px;         /* Tight, perfect smartphone width */
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding-bottom: 90px;     /* Smooth navigation clearance */
        }

        /* Sophisticated Brand Identity Layer */
        .brand-header {
            text-align: center;
            padding: 20px 0 10px 0;
        }

        .brand-header h1 {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--pure-white);
        }

        .brand-header span {
            color: var(--eco-green);
        }

        /* Ultra-Slim Minimalist Pillar Badges */
        .pillar-row {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .pillar-tag {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.04);
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .pillar-tag span {
            color: var(--eco-green);
            margin-right: 3px;
        }

        /* Elite Canvas Wrapper for TidyCal */
        .premium-widget-deck {
            width: 100%;
            background: #FFFFFF;
            border-radius: 20px;       /* Softer, more high-end fluid corners */
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), 
                        0 0 0 1px var(--card-border);
        }

        /* Floating Minimal Bottom Safe-Touch Action Bar */
        .sticky-action-bar {
            position: fixed;
            bottom: 16px;              /* Floats slightly above screen edge like modern iOS apps */
            left: 16px;
            right: 16px;
            display: flex;
            justify-content: center;
            z-index: 9999;
        }

        .cta-button {
            width: 100%;
            max-width: 378px;
            background: var(--eco-green);
            color: #080A11;
            text-align: center;
            padding: 16px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 15px;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 8px 24px rgba(57, 255, 20, 0.3);
            transition: transform 0.1s ease;
        }
        
        .cta-button:active {
            transform: scale(0.97);   /* Instant physical haptic-style click feedback */
        }
    </style>
</head>
<body>

<div class="app-container">
    
    <!-- Sophisticated, High-End Header Asset -->
    <div class="brand-header">
        <h1>Amiri <span>Solar Cleaning</span></h1>
        
        <!-- Reintroducing the Core Business Pillars in an Ultra-Slick Display -->
        <div class="pillar-row">
            <div class="pillar-tag"><span>✓</span> Spotless</div>
            <div class="pillar-tag"><span>✓</span> Protection</div>
            <div class="pillar-tag"><span>✓</span> Eco-Friendly</div>
            <div class="pillar-tag"><span>✓</span> Max Output</div>
        </div>
    </div>

    <!-- Clean, Fluid Widget Canvas Layout -->
    <div class="premium-widget-deck">
        <div class="tidycal-embed" data-path="electronicagent/free-first-time-slot-hold-no-payment"></div>
        <script src="https://tidycal.com/js/embed.js" async></script>
    </div>

</div>

<!-- Floating Tactile iOS-Style Navigation Bar -->
<div class="sticky-action-bar">
    <a href="tel:4084574067" class="cta-button">📞 Call Direct: 408-457-4067</a>
</div>

</body>
</html>
