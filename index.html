<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book FREE Estimate — Amiri Solar Cleaning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .date-number {
            font-weight: 700;
            font-size: 16px;
        }
        .navy {
            background-color: #002B54;
        }
        .brand-green {
            background-color: #10b981;
        }
    </style>
</head>
<body class="bg-slate-50">

<div class="max-w-5xl mx-auto p-4 md:p-8">

    <!-- Header -->
    <div class="flex justify-between items-center mb-6">
        <div class="flex items-center gap-3">
            <img src="logo ASC.png" class="h-9 w-9">
            <span class="font-bold text-2xl tracking-tight">Amiri Solar Cleaning</span>
        </div>
        <a href="tel:4084574067" class="flex items-center gap-2 text-sm font-medium bg-white px-4 py-2 rounded-2xl border border-slate-200">
            📞 408-457-4067
        </a>
    </div>

    <div class="grid md:grid-cols-12 gap-6">
        
        <!-- LEFT INFO -->
        <div class="md:col-span-5">
            <div class="bg-white rounded-3xl p-7 border border-slate-100 shadow-sm">
                <div class="inline-flex items-center px-3 py-1 bg-emerald-100 text-emerald-700 text-xs font-bold rounded-full mb-4">
                    FIRST VISIT IS 100% FREE
                </div>
                <h1 class="text-4xl font-bold tracking-tight">Book Your FREE Estimate</h1>
                <p class="mt-3 text-slate-600">No obligation. We inspect your property and give you a clear quote.</p>
            </div>
        </div>

        <!-- RIGHT: Booking -->
        <div class="md:col-span-7 bg-white rounded-3xl p-7 border border-slate-100 shadow-sm">
            
            <!-- Selected Slot -->
            <div id="selected-box" class="hidden mb-5 p-4 bg-emerald-50 border border-emerald-200 rounded-2xl">
                <div class="text-emerald-700 text-xs font-bold tracking-wider">YOU SELECTED</div>
                <div id="selected-text" class="text-xl font-bold text-emerald-800"></div>
            </div>

            <!-- MONTH NAVIGATION -->
            <div class="flex items-center justify-between mb-4">
                <button onclick="prevMonth()" class="px-3 py-1 text-xl font-bold text-emerald-600 hover:text-emerald-700">←</button>
                <div id="month-year" class="font-bold text-xl">May 2026</div>
                <button onclick="nextMonth()" class="px-3 py-1 text-xl font-bold text-emerald-600 hover:text-emerald-700">→</button>
            </div>

            <!-- CALENDAR -->
            <div class="mb-5">
                <div class="grid grid-cols-7 gap-1 text-center text-sm mb-1">
                    <div class="text-emerald-600 font-bold">S</div>
                    <div class="text-emerald-600 font-bold">M</div>
                    <div class="text-emerald-600 font-bold">T</div>
                    <div class="text-emerald-600 font-bold">W</div>
                    <div class="text-emerald-600 font-bold">T</div>
                    <div class="text-emerald-600 font-bold">F</div>
                    <div class="text-emerald-600 font-bold">S</div>
                </div>
                <div class="grid grid-cols-7 gap-1 text-center" id="calendar-grid">
                    <!-- Populated by JavaScript -->
                </div>
            </div>

            <!-- TIME SLOTS -->
            <div class="mb-6">
                <div class="text-sm font-semibold mb-2 text-slate-600">Available Times</div>
                <div class="grid grid-cols-3 gap-3" id="time-slots"></div>
            </div>

            <!-- FORM -->
            <form action="https://api.web3forms.com/submit" method="POST" class="space-y-4">
                
                <input type="hidden" name="access_key" value="b94d8c1f-1b42-4f44-920d-5975e5fdc6c6">
                <input type="hidden" name="email" value="amirisolarcleaning@gmail.com">
                <input type="hidden" name="cc" value="electronic.agent@gmail.com">
                <input type="hidden" name="subject" value="New FREE Estimate Request - Amiri Solar Cleaning">
                <input type="hidden" name="selected_slot" id="hidden-selected-slot">

                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-1.5">FULL NAME</label>
                    <input type="text" name="name" required placeholder="John Doe"
                           class="w-full px-4 py-3 border border-slate-200 rounded-2xl focus:outline-none focus:border-emerald-500">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-1.5">PHONE NUMBER</label>
                    <input type="tel" name="phone" required placeholder="(408) 555-0199"
                           class="w-full px-4 py-3 border border-slate-200 rounded-2xl focus:outline-none focus:border-emerald-500">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-1.5">SERVICE ADDRESS <span class="text-red-500">*</span></label>
                    <input type="text" name="address" required placeholder="Enter your full address"
                           class="w-full px-4 py-3 border border-slate-200 rounded-2xl focus:outline-none focus:border-emerald-500">
                </div>

                <button type="submit"
                        class="w-full py-4 bg-emerald-600 hover:bg-emerald-700 text-white font-bold text-lg rounded-2xl mt-2 transition">
                    Book My FREE Estimate
                </button>
            </form>
        </div>
    </div>
</div>

<script>
let currentMonth = 4; // May (0-indexed)
let currentYear = 2026;

function renderCalendar() {
    const grid = document.getElementById('calendar-grid');
    grid.innerHTML = '';

    const monthNames = ["January", "February", "March", "April", "May", "June", 
                        "July", "August", "September", "October", "November", "December"];
    
    document.getElementById('month-year').innerText = `${monthNames[currentMonth]} ${currentYear}`;

    const firstDay = new Date(currentYear, currentMonth, 1).getDay();
    const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

    // Empty cells before first day
    for (let i = 0; i < firstDay; i++) {
        const empty = document.createElement('div');
        empty.className = 'p-2 text-slate-300';
        grid.appendChild(empty);
    }

    // Days
    for (let day = 1; day <= daysInMonth; day++) {
        const dayDiv = document.createElement('div');
        dayDiv.className = `p-3 hover:bg-emerald-100 rounded-xl cursor-pointer text-center date-number transition`;
        dayDiv.innerText = day;

        const dateStr = `${monthNames[currentMonth]} ${day}, ${currentYear}`;

        dayDiv.onclick = () => {
            document.querySelectorAll('#calendar-grid > div').forEach(d => d.classList.remove('bg-emerald-600', 'text-white'));
            dayDiv.classList.add('bg-emerald-600', 'text-white');
            showTimeSlots(dateStr);
        };

        grid.appendChild(dayDiv);
    }
}

function showTimeSlots(date) {
    const container = document.getElementById('time-slots');
    container.innerHTML = '';

    const times = ["08:00 AM", "08:15 AM", "10:00 AM", "11:15 AM", "01:40 PM", "03:00 PM"];

    times.forEach(time => {
        const btn = document.createElement('button');
        btn.type = "button";
        btn.className = "py-3 px-4 bg-emerald-100 hover:bg-emerald-200 active:bg-emerald-300 text-emerald-800 font-semibold rounded-2xl text-sm transition";
        btn.innerText = time;

        btn.onclick = () => {
            selectTime(btn, date, time);
        };

        container.appendChild(btn);
    });
}

function selectTime(element, date, time) {
    document.querySelectorAll('#time-slots button').forEach(b => b.classList.remove('ring-2', 'ring-emerald-600', 'bg-emerald-600', 'text-white'));
    element.classList.add('ring-2', 'ring-emerald-600', 'bg-emerald-600', 'text-white');

    const full = `${date} at ${time}`;

    document.getElementById('selected-box').classList.remove('hidden');
    document.getElementById('selected-text').innerHTML = full;

    document.getElementById('hidden-selected-slot').value = full;
}

function prevMonth() {
    currentMonth--;
    if (currentMonth < 0) {
        currentMonth = 11;
        currentYear--;
    }
    renderCalendar();
}

function nextMonth() {
    currentMonth++;
    if (currentMonth > 11) {
        currentMonth = 0;
        currentYear++;
    }
    renderCalendar();
}

// Initialize
window.onload = function() {
    renderCalendar();
}
</script>

</body>
</html>
