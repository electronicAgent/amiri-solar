<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book FREE Estimate — Amiri Solar Cleaning</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">

<div class="max-w-5xl mx-auto p-4">

    <!-- Header -->
    <div class="flex justify-between items-center mb-6">
        <div class="flex items-center gap-3">
            <img src="logo ASC.png" class="h-10 w-10">
            <span class="font-bold text-2xl">Amiri Solar Cleaning</span>
        </div>
        <a href="tel:4084574067" class="text-sm font-medium">📞 408-457-4067</a>
    </div>

    <div class="grid md:grid-cols-12 gap-6">

        <!-- LEFT -->
        <div class="md:col-span-5">
            <div class="bg-white rounded-3xl p-6 border">
                <div class="inline-flex px-4 py-1 bg-emerald-100 text-emerald-700 text-xs font-bold rounded-full mb-4">
                    FIRST VISIT IS 100% FREE
                </div>
                <h1 class="text-4xl font-bold">Book Your FREE Estimate</h1>
                <p class="mt-3 text-slate-600">No obligation. We inspect and give you a clear quote.</p>
            </div>
        </div>

        <!-- RIGHT -->
        <div class="md:col-span-7 bg-white rounded-3xl p-6 border">

            <!-- Selected Slot -->
            <div id="selected-box" class="hidden mb-6 p-4 bg-emerald-50 border border-emerald-200 rounded-2xl">
                <div class="text-emerald-700 text-xs font-bold">YOU SELECTED</div>
                <div id="selected-text" class="text-xl font-bold text-emerald-800"></div>
            </div>

            <h2 class="font-bold text-2xl mb-4">Select Date & Time</h2>

            <!-- Month Navigation -->
            <div class="flex justify-between items-center mb-4">
                <button onclick="prevMonth()" class="text-3xl text-emerald-600">←</button>
                <div id="month-year" class="font-bold text-xl">May 2026</div>
                <button onclick="nextMonth()" class="text-3xl text-emerald-600">→</button>
            </div>

            <!-- Calendar -->
            <div class="grid grid-cols-7 gap-1 text-center mb-6" id="calendar-grid"></div>

            <!-- Time Slots (appear after selecting date) -->
            <div class="mb-6">
                <div class="text-sm font-semibold mb-3">Available Times</div>
                <div class="grid grid-cols-3 gap-3" id="time-slots"></div>
            </div>

            <!-- FORM -->
            <form action="https://api.web3forms.com/submit" method="POST" class="space-y-4">
                <input type="hidden" name="access_key" value="b94d8c1f-1b42-4f44-920d-5975e5fdc6c6">
                <input type="hidden" name="email" value="amirisolarcleaning@gmail.com">
                <input type="hidden" name="cc" value="electronic.agent@gmail.com">
                <input type="hidden" name="subject" value="New FREE Estimate Request - Amiri Solar Cleaning">
                <input type="hidden" name="selected_slot" id="hidden-slot">

                <div>
                    <label class="block text-xs font-bold mb-1">FULL NAME</label>
                    <input type="text" name="name" required placeholder="John Doe" class="w-full px-4 py-3 border rounded-2xl">
                </div>

                <div>
                    <label class="block text-xs font-bold mb-1">PHONE NUMBER</label>
                    <input type="tel" name="phone" required placeholder="(408) 555-0199" class="w-full px-4 py-3 border rounded-2xl">
                </div>

                <div>
                    <label class="block text-xs font-bold mb-1">SERVICE ADDRESS</label>
                    <input type="text" name="address" required placeholder="Enter your full address" class="w-full px-4 py-3 border rounded-2xl">
                </div>

                <button type="submit" class="w-full py-4 bg-emerald-600 text-white font-bold rounded-2xl text-lg">
                    Book My FREE Estimate
                </button>
            </form>
        </div>
    </div>
</div>

<script>
let currentMonth = 4;
let currentYear = 2026;

function renderCalendar() {
    const grid = document.getElementById('calendar-grid');
    grid.innerHTML = '';
    document.getElementById('month-year').textContent = `May ${currentYear}`;

    const firstDay = new Date(currentYear, currentMonth, 1).getDay();
    const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

    for (let i = 0; i < firstDay; i++) grid.innerHTML += `<div></div>`;

    for (let day = 1; day <= daysInMonth; day++) {
        const cell = document.createElement('div');
        cell.className = "p-3 text-center text-lg font-bold hover:bg-emerald-100 rounded-2xl cursor-pointer";
        cell.textContent = day;
        cell.onclick = () => {
            document.querySelectorAll('#calendar-grid > div').forEach(d => d.classList.remove('bg-emerald-600', 'text-white'));
            cell.classList.add('bg-emerald-600', 'text-white');
            showTimeSlots(`May ${day}, ${currentYear}`);
        };
        grid.appendChild(cell);
    }
}

function showTimeSlots(date) {
    const container = document.getElementById('time-slots');
    container.innerHTML = '';

    const times = ["08:00 AM", "09:00 AM", "10:00 AM", "11:00 AM", "01:00 PM", "02:00 PM", "03:00 PM"];

    times.forEach(time => {
        const btn = document.createElement('button');
        btn.className = "py-4 px-5 bg-emerald-100 hover:bg-emerald-200 text-emerald-800 font-semibold rounded-2xl transition";
        btn.textContent = time;
        btn.onclick = () => selectTime(btn, date, time);
        container.appendChild(btn);
    });
}

function selectTime(btn, date, time) {
    document.querySelectorAll('#time-slots button').forEach(b => b.classList.remove('bg-emerald-600', 'text-white'));
    btn.classList.add('bg-emerald-600', 'text-white');

    const full = `${date} at ${time}`;
    document.getElementById('selected-box').classList.remove('hidden');
    document.getElementById('selected-text').innerHTML = full;
    document.getElementById('hidden-slot').value = full;
}

function prevMonth() { currentMonth--; if (currentMonth < 0) { currentMonth = 11; currentYear--; } renderCalendar(); }
function nextMonth() { currentMonth++; if (currentMonth > 11) { currentMonth = 0; currentYear++; } renderCalendar(); }

window.onload = renderCalendar;
</script>

</body>
</html>
