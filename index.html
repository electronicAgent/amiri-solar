<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book FREE Estimate — Amiri Solar Cleaning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .date-cell {
            font-weight: 700;
            font-size: 17px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body class="bg-slate-50">

<div class="max-w-5xl mx-auto p-4 md:p-6">

    <!-- Header -->
    <div class="flex justify-between items-center mb-6">
        <div class="flex items-center gap-3">
            <img src="logo ASC.png" class="h-10 w-10">
            <div>
                <span class="font-bold text-2xl">Amiri</span>
                <span class="font-bold text-2xl text-emerald-600">Solar</span>
                <span class="font-bold text-2xl">Cleaning</span>
            </div>
        </div>
        <a href="tel:4084574067" class="text-sm font-medium flex items-center gap-2 bg-white px-4 py-2.5 rounded-2xl border">
            📞 408-457-4067
        </a>
    </div>

    <div class="grid md:grid-cols-12 gap-6">
        
        <!-- LEFT -->
        <div class="md:col-span-5">
            <div class="bg-white rounded-3xl p-6 border border-slate-100">
                <div class="inline-flex px-4 py-1.5 bg-emerald-100 text-emerald-700 text-xs font-bold rounded-full mb-4">
                    FIRST VISIT IS 100% FREE
                </div>
                <h1 class="text-3xl font-bold">Book Your FREE Estimate</h1>
                <p class="mt-3 text-slate-600">No obligation. Professional inspection and clear quote.</p>
            </div>
        </div>

        <!-- RIGHT -->
        <div class="md:col-span-7 bg-white rounded-3xl p-6 border border-slate-100">
            
            <!-- Selected -->
            <div id="selected-box" class="hidden mb-6 p-4 bg-emerald-50 border border-emerald-200 rounded-2xl">
                <div class="text-emerald-700 text-xs font-bold">YOU SELECTED</div>
                <div id="selected-text" class="text-xl font-bold text-emerald-800"></div>
            </div>

            <h2 class="font-bold text-2xl mb-4">Select Date &amp; Time</h2>

            <!-- Month Navigation -->
            <div class="flex items-center justify-between mb-4">
                <button onclick="prevMonth()" class="w-10 h-10 flex items-center justify-center text-2xl text-emerald-600 hover:bg-emerald-100 rounded-xl">←</button>
                <div id="month-year" class="font-bold text-xl text-slate-800">May 2026</div>
                <button onclick="nextMonth()" class="w-10 h-10 flex items-center justify-center text-2xl text-emerald-600 hover:bg-emerald-100 rounded-xl">→</button>
            </div>

            <!-- Calendar -->
            <div class="grid grid-cols-7 gap-1 text-center mb-6" id="calendar-grid"></div>

            <!-- Time Slots -->
            <div class="mb-6">
                <div class="text-sm font-semibold mb-3 text-slate-600">Available Times</div>
                <div class="grid grid-cols-3 gap-3" id="time-slots"></div>
            </div>

            <!-- FORM -->
            <form action="https://api.web3forms.com/submit" method="POST" class="space-y-5">
                <input type="hidden" name="access_key" value="b94d8c1f-1b42-4f44-920d-5975e5fdc6c6">
                <input type="hidden" name="email" value="amirisolarcleaning@gmail.com">
                <input type="hidden" name="cc" value="electronic.agent@gmail.com">
                <input type="hidden" name="subject" value="New FREE Estimate Request">
                <input type="hidden" name="selected_slot" id="hidden-slot">

                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-1.5">FULL NAME</label>
                    <input type="text" name="name" required placeholder="John Doe" class="w-full px-4 py-3.5 border border-slate-200 rounded-2xl focus:border-emerald-500 focus:outline-none">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-1.5">PHONE NUMBER</label>
                    <input type="tel" name="phone" required placeholder="(408) 555-0199" class="w-full px-4 py-3.5 border border-slate-200 rounded-2xl focus:border-emerald-500 focus:outline-none">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-1.5">SERVICE ADDRESS</label>
                    <input type="text" name="address" required placeholder="Enter your full address" class="w-full px-4 py-3.5 border border-slate-200 rounded-2xl focus:border-emerald-500 focus:outline-none">
                </div>

                <button type="submit" class="w-full py-4 bg-emerald-600 hover:bg-emerald-700 text-white font-bold text-lg rounded-2xl">
                    Book My FREE Estimate
                </button>
            </form>
        </div>
    </div>
</div>

<script>
let currentMonth = 4;  // May
let currentYear = 2026;

function renderCalendar() {
    const grid = document.getElementById('calendar-grid');
    grid.innerHTML = '';

    document.getElementById('month-year').textContent = `May ${currentYear}`;

    const firstDay = new Date(currentYear, currentMonth, 1).getDay();
    const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

    for (let i = 0; i < firstDay; i++) {
        const empty = document.createElement('div');
        grid.appendChild(empty);
    }

    for (let day = 1; day <= daysInMonth; day++) {
        const dateStr = `May ${day}, ${currentYear}`;
        const cell = document.createElement('div');
        cell.className = `date-cell rounded-2xl cursor-pointer hover:bg-emerald-100`;
        cell.textContent = day;

        cell.onclick = () => {
            document.querySelectorAll('#calendar-grid div').forEach(d => d.classList.remove('bg-emerald-600', 'text-white'));
            cell.classList.add('bg-emerald-600', 'text-white');
            showTimeSlots(dateStr);
        };

        grid.appendChild(cell);
    }
}

function showTimeSlots(date) {
    const container = document.getElementById('time-slots');
    container.innerHTML = '';

    const times = ["08:00 AM", "08:15 AM", "10:00 AM", "11:15 AM", "01:40 PM", "03:00 PM"];

    times.forEach(time => {
        const btn = document.createElement('button');
        btn.className = "py-3.5 px-4 bg-emerald-100 hover:bg-emerald-200 text-emerald-800 font-semibold rounded-2xl text-sm transition";
        btn.textContent = time;
        btn.onclick = () => selectTime(btn, date, time);
        container.appendChild(btn);
    });
}

function selectTime(btn, date, time) {
    document.querySelectorAll('#time-slots button').forEach(b => b.classList.remove('bg-emerald-600', 'text-white'));
    btn.classList.add('bg-emerald-600', 'text-white');

    const fullText = `${date} at ${time}`;
    document.getElementById('selected-box').classList.remove('hidden');
    document.getElementById('selected-text').innerHTML = fullText;
    document.getElementById('hidden-slot').value = fullText;
}

function prevMonth() {
    currentMonth--;
    if (currentMonth < 0) { currentMonth = 11; currentYear--; }
    renderCalendar();
}

function nextMonth() {
    currentMonth++;
    if (currentMonth > 11) { currentMonth = 0; currentYear++; }
    renderCalendar();
}

// Init
window.onload = renderCalendar;
</script>

</body>
</html>
