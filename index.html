<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Amiri Solar Cleaning - Instant Scheduling</title>
    <style>
        :root {
            --deep-navy: #0B132B;
            --midnight-blue: #1C2541;
            --electric-blue: #3A506B;
            --eco-green: #39FF14; /* Hyper-contrast lime green for active CTA */
            --pure-white: #FFFFFF;
            --text-muted: #A5B4FC;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--deep-navy);
            color: var(--pure-white);
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 440px; /* Locked to clean mobile viewport width */
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-bottom: 90px; /* Space for sticky footer */
        }

        /* Clean, Modern Header */
        .brand-header {
            text-align: center;
            padding: 15px 0 5px 0;
        }

        .brand-header h1 {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
            text-transform: uppercase;
        }

        .brand-header span {
            color: var(--eco-green);
        }

        /* Geometric Mock Solar UI Graphics element */
        .solar-grid-accent {
            width: 100%;
            height: 60px;
            background: linear-gradient(135deg, rgba(58,80,107,0.3) 25%, transparent 25%), 
                        linear-gradient(225deg, rgba(58,80,107,0.3) 25%, transparent 25%), 
                        linear-gradient(45deg, rgba(58,80,107,0.3) 25%, transparent 25%), 
                        linear-gradient(315deg, rgba(58,80,107,0.3) 25%, transparent 25%);
            background-size: 20px 20px;
            background-position: 10px 0, 10px 0, 0 0, 0 0;
            border-radius: 8px;
            opacity: 0.6;
        }

        /* Premium Promotional Intake Card */
        .promo-card {
            background: linear-gradient(145deg, var(--midnight-blue), #111a36);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .promo-badge {
            display: inline-block;
            background: rgba(57, 255, 20, 0.1);
            color: var(--eco-green);
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .promo-card h2 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .promo-card p {
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        /* Native Keyboard Autofill Optimization Fields */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .input-wrapper {
            position: relative;
        }

        input {
            width: 100%;
            padding: 16px 16px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(11, 19, 43, 0.6);
            color: var(--pure-white);
            font-size: 16px; /* Prevents iOS auto-zoom on focus */
            transition: all 0.2s ease;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        input:focus {
            border-color: var(--eco-green);
            background: rgba(11, 19, 43, 0.9);
            outline: none;
            box-shadow: 0 0 10px rgba(57, 255, 20, 0.15);
        }

        /* Seamless TidyCal Container Layer */
        .calendar-section {
            background: var(--midnight-blue);
            border-radius: 16px;
            padding: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .calendar-section h3 {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            text-align: center;
            padding-top: 4px;
            margin-bottom: 4px;
        }

        /* Fixed Mobile Bottom Safe-Tap Call Bar */
        .sticky-action-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(11, 19, 43, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 14px 20px;
            display: flex;
            justify-content: center;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 9999;
        }

        .cta-button {
            width: 100%;
            max-width: 400px;
            background-color: var(--eco-green);
            color: var(--deep-navy);
            text-align: center;
            padding: 16px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 16px;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(57, 255, 20, 0.3);
            display: inline-block;
        }
    </style>
</head>
<body>

<div class="app-container">
    
    <div class="brand-header">
        <h1>Amiri <span>Solar Cleaning</span></h1>
    </div>

    <div class="solar-grid-accent"></div>

    <!-- Intake card optimized to trigger system-level personal card autofill -->
    <div class="promo-card">
        <span class="promo-badge">Limited Time Promotion</span>
        <h2>Secure Your First-Time Discount</h2>
        <p>Tap any field below to use your phone's secure autofill. No payment required to reserve your slot.</p>
        
        <form class="form-group" onsubmit="return false;">
            <div class="input-wrapper">
                <input type="text" name="customer_name" autocomplete="name" placeholder="Full Name" required>
            </div>
            <div class="input-wrapper">
                <input type="tel" name="customer_phone" autocomplete="tel" placeholder="Cell Phone Number" required>
            </div>
            <div class="input-wrapper); margin-bottom: 4px;">
                <input type="text" name="customer_address" autocomplete="street-address" placeholder="Service Street Address" required>
            </div>
        </form>
    </div>

    <!-- Live TidyCal Interface Area -->
    <div class="calendar-section">
        <h3>1. Select Date & Time Slot Below</h3>
        
        <!-- Native Responsive TidyCal Widget Container -->
        <div class="tidycal-embed" data-path="electronicagent/free-first-time-slot-hold-no-payment"></div>
        <script src="https://tidycal.com/js/embed.js" async></script>
    </div>

</div>

<!-- Unshakable Thumb-Level Direct Dial Support -->
<div class="sticky-action-bar">
    <a href="tel:4084574067" class="cta-button">📞 Call to Book: 408-457-4067</a>
</div>

</body>
</html>
