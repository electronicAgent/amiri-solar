<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book FREE Estimate — Amiri Solar Cleaning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .navy { color: #002B54; }
        .brand-green { background-color: #10b981; }
        .brand-green:hover { background-color: #0f9e6e; }
    </style>
</head>
<body class="bg-slate-50">

<div class="max-w-5xl mx-auto p-4">

    <!-- Header -->
    <div class="flex justify-between items-center mb-6">
        <div class="flex items-center gap-3">
            <img src="logo ASC.png" class="h-10 w-10">
            <span class="font-bold text-2xl navy">Amiri Solar Cleaning</span>
        </div>
        <a href="tel:4084574067" class="flex items-center gap-2 text-sm font-medium bg-white px-4 py-2.5 rounded-2xl border border-slate-200">
            📞 408-457-4067
        </a>
    </div>

    <div class="grid md:grid-cols-12 gap-6">

        <!-- LEFT -->
        <div class="md:col-span-5">
            <div class="bg-white rounded-3xl p-6 border border-slate-100">
                <div class="inline-flex px-4 py-1.5 bg-emerald-100 text-emerald-700 text-xs font-bold rounded-full mb-4">
                    FIRST VISIT IS 100% FREE
                </div>
                <h1 class="text-4xl font-bold navy">Book Your FREE Estimate</h1>
                <p class="mt-3 text-slate-600">No obligation. We inspect and give you a clear quote.</p>
            </div>
        </div>

        <!-- RIGHT - Stronger Branding -->
        <div class="md:col-span-7 bg-white rounded-3xl border border-slate-100 overflow-hidden">

            <!-- Navy Blue Header -->
            <div class="bg-[#002B54] text-white px-6 py-4">
                <h2 class="font-bold text-2xl">Select Date & Time</h2>
            </div>

            <div class="p-6">

                <div id="selected-box" class="hidden mb-6 p-4 bg-emerald-50 border border-emerald-200 rounded-2xl">
                    <div class="text-emerald-700 text-xs font-bold">YOU SELECTED</div>
                    <div id="selected-text" class="text-xl font-bold text-emerald-800"></div>
                </div>

                <!-- Month Navigation -->
                <div class="flex justify-between items-center mb-4">
                    <button onclick="prevMonth()" class="text-3xl text-emerald-600">←</button>
                    <div id="month-year" class="font-bold text-xl navy"></div>
                    <button onclick="nextMonth()" class="text-3xl text-emerald-600">→</button>
                </div>

                <!-- Calendar -->
                <div class="grid grid-cols-7 gap-1 text-center mb-6" id="calendar-grid"></div>

                <!-- Time Slots -->
                <div id="time-slots-section" class="mb-6">
                    <div class="text-sm font-semibold mb-3 text-slate-600">Available Times</div>
                    <div class="grid grid-cols-3 gap-3" id="time-slots"></div>
                </div>

                <!-- FORM -->
                <form action="https://api.web3forms.com/submit" method="POST" class="space-y-4">
                    <input type="hidden" name="access_key" value="b94d8c1f-1b42-4f44-920d-5975e5fdc6c6">
                    <input type="hidden" name="email" value="amirisolarcleaning@gmail.com">
                    <input type="hidden" name="cc" value="electronic.agent@gmail.com">
                    <input type="hidden" name="subject" value="New FREE Estimate Request - Amiri Solar Cleaning">
                    <input type="hidden" name="selected_slot" id="hidden-slot">

                    <div>
                        <label class="block text-xs font-bold mb-1 text-slate-600">FULL NAME <span class="text-red-500">*</span></label>
                        <input type="text" name="name" required placeholder="John Doe" class="w-full px-4 py-3 border border-slate-200 rounded-2xl focus:border-emerald-500 focus:outline-none">
                    </div>

                    <div>
                        <label class="block text-xs font-bold mb-1 text-slate-600">PHONE NUMBER <span class="text-red-500">*</span></label>
                        <input type="tel" name="phone" required placeholder="(408) 555-0199" class="w-full px-4 py-3 border border-slate-200 rounded-2xl focus:border-emerald-500 focus:outline-none">
                    </div>

                    <div>
                        <label class="block text-xs font-bold mb-1 text-slate-600">SERVICE ADDRESS <span class="text-red-500">*</span></label>
                        <input type="text" name="address" required placeholder="Enter your full address" class="w-full px-4 py-3 border border-slate-200 rounded-2xl focus:border-emerald-500 focus:outline-none">
                    </div>

                    <button type="submit" class="w-full py-4 brand-green text-white font-bold rounded-2xl text-lg transition">
                        Book My FREE Estimate
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
let currentDate = new Date();

function renderCalendar() {
    const grid = document.getElementById('calendar-grid');
    grid.innerHTML = '';

    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();
    const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];
    
    document.getElementById('month-year').textContent = `${monthNames[month]} ${year}`;

    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const today = new Date();
    today.setHours(0,0,0,0);

    for (let i = 0; i < firstDay; i++) grid.innerHTML += `<div></div>`;

    for (let day = 1; day <= daysInMonth; day++) {
        const cellDate = new Date(year, month, day);
        const cell = document.createElement('div');
        cell.className = "p-3 text-center text-lg font-bold rounded-2xl";

        if (cellDate < today) {
            cell.className += " text-slate-300 cursor-not-allowed";
        } else {
            cell.className += " hover:bg-emerald-100 cursor-pointer";
            cell.onclick = () => {
                document.querySelectorAll('#calendar-grid > div').forEach(d => d.classList.remove('bg-emerald-600', 'text-white'));
                cell.classList.add('bg-emerald-600', 'text-white');
                const dateStr = `${monthNames[month]} ${day}, ${year}`;
                showTimeSlots(dateStr);
                setTimeout(() => {
                    document.getElementById('time-slots-section').scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 300);
            };
        }
        cell.textContent = day;
        grid.appendChild(cell);
    }
}

function showTimeSlots(date) {
    const container = document.getElementById('time-slots');
    container.innerHTML = '';

    const times = ["06:00 AM", "07:00 AM", "08:00 AM", "09:00 AM", "10:00 AM", "11:00 AM", "01:00 PM", "02:00 PM", "03:00 PM"];

    times.forEach(time => {
        const btn = document.createElement('button');
        btn.className = "py-4 px-5 bg-emerald-100 hover:bg-emerald-200 text-emerald-800 font-semibold rounded-2xl transition";
        btn.textContent = time;
        btn.onclick = () => selectTime(btn, date, time);
        container.appendChild(btn);
    });
}

function selectTime(btn, date, time) {
    document.querySelectorAll('#time-slots button').forEach(b => b.classList.remove('bg-emerald-600', 'text-white'));
    btn.classList.add('bg-emerald-600', 'text-white');

    const full = `${date} at ${time}`;
    document.getElementById('selected-box').classList.remove('hidden');
    document.getElementById('selected-text').innerHTML = full;
    document.getElementById('hidden-slot').value = full;

    setTimeout(() => {
        document.getElementById('form-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 400);
}

function prevMonth() {
    currentDate.setMonth(currentDate.getMonth() - 1);
    renderCalendar();
}

function nextMonth() {
    currentDate.setMonth(currentDate.getMonth() + 1);
    renderCalendar();
}

window.onload = renderCalendar;
</script>

</body>
</html>
