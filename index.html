<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Amiri Solar Cleaning - Book a Slot</title>
    <style>
        :root {
            --deep-bg: #090E1A;       /* Ultra-clean deep space dark background */
            --eco-green: #39FF14;     /* Crisp neon green action accent */
            --pure-white: #FFFFFF;
            --text-muted: #8E9AA8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--deep-bg);
            color: var(--pure-white);
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 420px;         /* Slimmed down mobile frame */
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-bottom: 85px;     /* Space for sticky footer */
        }

        /* Minimalistic, Slick Brand Header */
        .brand-header {
            text-align: center;
            padding: 16px 0 8px 0;
        }

        .brand-header h1 {
            font-size: 20px;          /* Scaled down for subtle elegance */
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: var(--pure-white);
        }

        .brand-header span {
            color: var(--eco-green);
        }

        /* Seamless Widget Wrapper */
        .widget-container {
            width: 100%;
            background: #FFFFFF;       /* Matches TidyCal's native background perfectly */
            border-radius: 14px;       /* Smooth modern corners */
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }

        /* Slim, Fixed Bottom Sticky Call Action Bar */
        .sticky-action-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(9, 14, 26, 0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 9999;
        }

        .cta-button {
            width: 100%;
            max-width: 390px;
            background-color: var(--eco-green);
            color: #090E1A;
            text-align: center;
            padding: 14px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 15px;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 12px rgba(57, 255, 20, 0.25);
            display: inline-block;
            transition: transform 0.1s ease;
        }
        
        .cta-button:active {
            transform: scale(0.98);   /* Tactile mobile tap effect */
        }
    </style>
</head>
<body>

<div class="app-container">
    
    <!-- Clean, Tight Top Navigation Identity -->
    <div class="brand-header">
        <h1>Amiri <span>Solar Cleaning</span></h1>
    </div>

    <!-- The Entire Interface consolidated strictly into TidyCal's native flow -->
    <div class="widget-container">
        <div class="tidycal-embed" data-path="electronicagent/free-first-time-slot-hold-no-payment"></div>
        <script src="https://tidycal.com/js/embed.js" async></script>
    </div>

</div>

<!-- Unshakable Minimal Footer Call Alternative -->
<div class="sticky-action-bar">
    <a href="tel:4084574067" class="cta-button">📞 Quick Call: 408-457-4067</a>
</div>

</body>
</html>
